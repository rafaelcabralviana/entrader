# Incluído por django-active-static-media.conf quando o app ativo é ProjetoAlkha
location /static/ {
    alias /home/ProjetoAlkha/core/staticfiles/;
    expires 30d;
    add_header Cache-Control "public, immutable";
    access_log off;
}

location /media/ {
    alias /home/ProjetoAlkha/core/media/;
    expires 30d;
    add_header Cache-Control "public";
}
