{# Incluir no final de extra_js (após candles_volume). Requer ticker, automation_market_sim, replay_* ISO no #automation-replay-bar. #}
<script>
(function() {
  var STREAM_API = "/automacoes/replay-stream/";
  var TICKER = ("{{ ticker|default:''|escapejs }}" || "{{ default_ticker_js|default:''|escapejs }}").trim();
  var SESSION = "{{ automation_market_sim.session_date_iso|default:''|escapejs }}";

  var playing = false;
  var virtualTimer = null;
  /** ~0,5 s de parede entre ticks do relógio virtual. */
  var WALL_TICK_MS = 500;

  try {
    window.__ENTRADE_REPLAY_PLAYING__ = false;
    window.__ENTRADE_REPLAY_LOG_POLL_SUPPRESS__ = false;
    window.__ENTRADE_REPLAY_CURSOR_STRATEGIES__ = true;
  } catch (eRP0) {}

  var speedEl = document.getElementById('automation-replay-speed');
  var statusEl = document.getElementById('automation-replay-status');
  function replayStatusNow() {
    return document.getElementById('automation-replay-status') || statusEl;
  }
  var timeLabel = document.getElementById('automation-replay-time-label');
  var btnPlay = document.getElementById('automation-replay-play');
  var btnContinue = document.getElementById('automation-replay-continue');
  var btnPause = document.getElementById('automation-replay-pause');
  var btnReset = document.getElementById('automation-replay-reset');
  var btnMotor = document.getElementById('automation-replay-motor-run');
  var replayBar = document.getElementById('automation-replay-bar');

  var startDate = null;
  var capDate = null;
  var curVirtual = null;

  function getReplayTicker() {
    var el = document.getElementById('candles-ticker');
    var v = el && el.value ? String(el.value).trim().toUpperCase() : '';
    return v || TICKER;
  }

  function readSessionEnds() {
    if (!replayBar) return;
    var s0 = replayBar.getAttribute('data-replay-start') || '';
    var c0 = replayBar.getAttribute('data-replay-cap') || '';
    startDate = s0 ? new Date(s0) : null;
    capDate = c0 ? new Date(c0) : null;
  }

  /** Lê o instante do cursor a partir da barra (servidor ou último ``persistCursorToBar``). */
  function loadCursorFromBar() {
    if (!replayBar) return;
    var u0 = replayBar.getAttribute('data-replay-cursor') || '';
    var s0 = replayBar.getAttribute('data-replay-start') || '';
    var iso = u0 || s0;
    curVirtual = iso ? new Date(iso) : (startDate ? new Date(startDate.getTime()) : null);
  }

  function readBarBounds() {
    readSessionEnds();
    loadCursorFromBar();
  }

  function persistCursorToBar() {
    if (!replayBar || !curVirtual || !isFinite(curVirtual.getTime())) return;
    try {
      replayBar.setAttribute('data-replay-cursor', curVirtual.toISOString());
    } catch (ePc) {}
  }

  function setPlayButtonsEnabled(on) {
    if (btnPlay) btnPlay.disabled = !on;
    if (btnContinue) btnContinue.disabled = !on;
  }

  function boundsOk() {
    return (
      startDate &&
      capDate &&
      curVirtual &&
      isFinite(startDate.getTime()) &&
      isFinite(capDate.getTime()) &&
      isFinite(curVirtual.getTime()) &&
      capDate.getTime() >= startDate.getTime()
    );
  }

  function fmtVirtualLabel(d) {
    try {
      if (!d || !isFinite(d.getTime())) return '—';
      return new Intl.DateTimeFormat('pt-BR', {
        dateStyle: 'short',
        timeStyle: 'medium',
        hour12: false,
        timeZone: 'America/Sao_Paulo',
      }).format(d);
    } catch (e1) {
      return '—';
    }
  }

  function updateTimeLabel() {
    if (!timeLabel || !curVirtual) return;
    timeLabel.textContent = fmtVirtualLabel(curVirtual) + ' (BRT)';
  }

  var _candleReloadLast = 0;
  var _candleReloadTimer = null;
  var CANDLE_RELOAD_MIN_MS = 220;

  function getCsrfToken() {
    try {
      var input = document.querySelector('input[name=\"csrfmiddlewaretoken\"]');
      if (input && input.value) return String(input.value);
    } catch (eForm) {}
    try {
      var m = document.cookie.match(/(^|;)\s*csrftoken\s*=\s*([^;]+)/);
      return m ? decodeURIComponent(m[2]) : '';
    } catch (eC) {
      return '';
    }
  }

  function postReplayCursorImmediate(iso, withStrategies) {
    var tok = getCsrfToken();
    if (!tok) return;
    var strat = withStrategies !== false;
    var body =
      'replay_until=' +
      encodeURIComponent(iso == null || iso === '' ? '' : String(iso)) +
      '&strategies=' +
      (strat ? '1' : '0');
    fetch('/automacoes/sim-replay-cursor/', {
      method: 'POST',
      credentials: 'same-origin',
      headers: {
        'Content-Type': 'application/x-www-form-urlencoded',
        'X-CSRFToken': tok,
      },
      body: body,
    }).catch(function() {});
  }

  function formatYmdBrFromIso(ymd) {
    var p = String(ymd || '').split('-');
    if (p.length !== 3) return String(ymd || '');
    return p[2] + '/' + p[1] + '/' + p[0];
  }

  function ensureSessionOptionForReplay(ymd) {
    var sel = document.getElementById('candles-session-date');
    if (!sel || !ymd) return;
    var v = String(ymd).trim().slice(0, 10);
    if (v.length !== 10) return;
    if (sel.querySelector('option[value="' + v + '"]')) return;
    var o = document.createElement('option');
    o.value = v;
    o.textContent = formatYmdBrFromIso(v) + ' (simulação)';
    sel.appendChild(o);
  }

  function replayCursorStrategiesOn() {
    try {
      window.__ENTRADE_REPLAY_CURSOR_STRATEGIES__ = true;
    } catch (eCrs) {}
  }

  function syncCandlesTo(iso, withStrategies) {
    window.__ENTRADE_REPLAY_MODE__ = true;
    window.__ENTRADE_REPLAY_UNTIL__ = iso;
    var strat = withStrategies;
    if (strat === undefined) {
      try {
        strat = window.__ENTRADE_REPLAY_CURSOR_STRATEGIES__ !== false;
      } catch (eS1) {
        strat = true;
      }
    }
    postReplayCursorImmediate(iso, strat);
    if (SESSION) {
      try {
        ensureSessionOptionForReplay(SESSION);
        var sdc = document.getElementById('candles-session-date');
        if (sdc) sdc.value = SESSION;
      } catch (eRSd) {}
    }
    if (typeof window.__ENTRADE_REPLAY_TRIM_CHART === 'function' && window.__ENTRADE_REPLAY_CHART_MASTER_READY) {
      try {
        if (window.__ENTRADE_REPLAY_TRIM_CHART(iso)) {
          _candleReloadLast = Date.now();
          if (_candleReloadTimer) {
            clearTimeout(_candleReloadTimer);
            _candleReloadTimer = null;
          }
          return;
        }
      } catch (eFs) {}
    }
    var now = Date.now();
    function fire() {
      _candleReloadLast = Date.now();
      _candleReloadTimer = null;
      if (typeof window.__ENTRADE_REPLAY_TRIM_CHART === 'function') {
        if (window.__ENTRADE_REPLAY_CHART_MASTER_READY) {
          try {
            var uCur = window.__ENTRADE_REPLAY_UNTIL__;
            if (window.__ENTRADE_REPLAY_TRIM_CHART(uCur)) return;
          } catch (eTr) {}
        } else if (typeof window.__ENTRADE_REPLAY_ENSURE_DAY_MASTER === 'function') {
          window.__ENTRADE_REPLAY_ENSURE_DAY_MASTER(function() {
            try {
              var u2 = window.__ENTRADE_REPLAY_UNTIL__;
              if (typeof window.__ENTRADE_REPLAY_TRIM_CHART === 'function') {
                window.__ENTRADE_REPLAY_TRIM_CHART(u2);
              }
            } catch (eTr2) {}
          });
          return;
        }
      }
      if (typeof window.__ENTRADE_CANDLES_RELOAD__ === 'function') {
        window.__ENTRADE_CANDLES_RELOAD__();
      }
    }
    if (now - _candleReloadLast >= CANDLE_RELOAD_MIN_MS) {
      if (_candleReloadTimer) {
        clearTimeout(_candleReloadTimer);
        _candleReloadTimer = null;
      }
      fire();
      return;
    }
    if (_candleReloadTimer) clearTimeout(_candleReloadTimer);
    _candleReloadTimer = setTimeout(fire, CANDLE_RELOAD_MIN_MS - (now - _candleReloadLast));
  }

  function clearVirtualTimer() {
    if (virtualTimer) {
      clearInterval(virtualTimer);
      virtualTimer = null;
    }
  }

  function tickVirtual() {
    if (!playing || !curVirtual || !capDate) return;
    var sp = parseFloat(speedEl && speedEl.value ? speedEl.value : '1') || 1;
    if (sp < 0.25) sp = 0.25;
    if (sp > 512) sp = 512;
    var nextMs = curVirtual.getTime() + WALL_TICK_MS * sp;
    var capMs = capDate.getTime();
    if (nextMs >= capMs) {
      curVirtual = new Date(capMs);
      persistCursorToBar();
      updateTimeLabel();
      syncCandlesTo(curVirtual.toISOString(), true);
      pauseVirtual(true);
      var stEnd = replayStatusNow();
      if (stEnd) stEnd.textContent = 'Fim do intervalo do pregão (relógio virtual).';
      return;
    }
    curVirtual = new Date(nextMs);
    persistCursorToBar();
    updateTimeLabel();
    syncCandlesTo(curVirtual.toISOString(), true);
  }

  function pauseVirtual(reachedEnd) {
    playing = false;
    try {
      window.__ENTRADE_REPLAY_PLAYING__ = false;
      window.__ENTRADE_REPLAY_LOG_POLL_SUPPRESS__ = !reachedEnd;
    } catch (eRP2) {}
    clearVirtualTimer();
    replayCursorStrategiesOn();
    setPlayButtonsEnabled(true);
    if (btnPause) btnPause.disabled = true;
    if (!reachedEnd) {
      var st = replayStatusNow();
      if (st) st.textContent = 'Pausado.';
      if (curVirtual && isFinite(curVirtual.getTime())) {
        persistCursorToBar();
        postReplayCursorImmediate(curVirtual.toISOString(), true);
      }
    }
  }

  /**
   * @param {boolean} fromSessionStart true = cursor no abrir do pregão (BRT); false = retoma no instante actual (após pausa ou arrasto).
   */
  function resumePlayVirtual(fromSessionStart) {
    readSessionEnds();
    if (
      !startDate ||
      !capDate ||
      !isFinite(startDate.getTime()) ||
      !isFinite(capDate.getTime()) ||
      capDate.getTime() < startDate.getTime()
    ) {
      var st0 = replayStatusNow();
      if (st0) st0.textContent = 'Datas do pregão em falta — recarregue após aplicar a sessão.';
      return;
    }
    if (fromSessionStart === true) {
      curVirtual = new Date(startDate.getTime());
      persistCursorToBar();
    } else {
      if (!curVirtual || !isFinite(curVirtual.getTime())) {
        loadCursorFromBar();
      }
    }
    if (!curVirtual || !isFinite(curVirtual.getTime())) {
      var stMiss = replayStatusNow();
      if (stMiss) stMiss.textContent = 'Instante do relógio em falta.';
      return;
    }
    var tok = getCsrfToken();
    if (!tok) {
      var stCs = replayStatusNow();
      if (stCs) stCs.textContent = 'CSRF em falta — recarregue a página.';
      return;
    }
    if (curVirtual.getTime() >= capDate.getTime()) {
      curVirtual = new Date(startDate.getTime());
      persistCursorToBar();
    }
    replayCursorStrategiesOn();
    playing = true;
    try {
      window.__ENTRADE_REPLAY_PLAYING__ = true;
      window.__ENTRADE_REPLAY_LOG_POLL_SUPPRESS__ = false;
    } catch (eRP1) {}
    setPlayButtonsEnabled(false);
    if (btnPause) btnPause.disabled = false;
    var stP = replayStatusNow();
    if (stP) stP.textContent = 'Relógio virtual a correr…';
    updateTimeLabel();
    syncCandlesTo(curVirtual.toISOString(), true);
    clearVirtualTimer();
    virtualTimer = setInterval(tickVirtual, WALL_TICK_MS);
  }

  function resetVirtual() {
    pauseVirtual(false);
    readSessionEnds();
    if (startDate && isFinite(startDate.getTime())) {
      curVirtual = new Date(startDate.getTime());
    }
    persistCursorToBar();
    updateTimeLabel();
    if (boundsOk()) {
      syncCandlesTo(curVirtual.toISOString(), true);
    }
    try {
      window.__ENTRADE_REPLAY_LOG_POLL_SUPPRESS__ = false;
    } catch (eRS) {}
    var stR = replayStatusNow();
    if (stR) stR.textContent = 'Reinício — instante no início do pregão (BRT).';
  }

  function syncSessionDateSelect(done) {
    var sel = document.getElementById('candles-session-date');
    var btn = document.getElementById('candles-refresh');
    if (!sel || !SESSION) {
      if (done) done();
      return;
    }
    ensureSessionOptionForReplay(SESSION);
    var tries = 0;
    function tickSd() {
      if (sel.querySelector('option[value="' + SESSION + '"]')) {
        sel.value = SESSION;
        if (btn) btn.click();
        setTimeout(function() { if (done) done(); }, 200);
        return;
      }
      if (tries++ < 120) setTimeout(tickSd, 50);
      else if (done) done();
    }
    setTimeout(tickSd, 0);
  }

  function primeReplayChart() {
    try {
      if (typeof window.__ENTRADE_REPLAY_INVALIDATE_DAY_MASTER === 'function') {
        window.__ENTRADE_REPLAY_INVALIDATE_DAY_MASTER();
      }
    } catch (eInv) {}
    readBarBounds();
    if (!boundsOk()) {
      var st = replayStatusNow();
      if (st) st.textContent = 'Configure ticker e dia da sessão.';
      setPlayButtonsEnabled(false);
      return;
    }
    setPlayButtonsEnabled(true);
    updateTimeLabel();
    syncSessionDateSelect(function() {
      if (curVirtual && isFinite(curVirtual.getTime())) {
        persistCursorToBar();
        syncCandlesTo(curVirtual.toISOString(), true);
      }
      var stOk = replayStatusNow();
      if (stOk) {
        stOk.textContent =
          'Relógio pronto — Iniciar ou Continuar avançam a partir do instante actual; Reinício repõe o abrir do pregão.';
      }
    });
  }

  function enqueueReplayMotor() {
    var tok = getCsrfToken();
    if (!tok) {
      var stCs = replayStatusNow();
      if (stCs) stCs.textContent = 'CSRF em falta — recarregue a página.';
      return;
    }
    var sp = parseFloat(speedEl && speedEl.value ? speedEl.value : '1') || 1;
    if (sp < 0.25) sp = 0.25;
    if (sp > 512) sp = 512;
    var paceSec = 1.0 / sp;
    var maxEl = document.getElementById('automation-replay-max');
    var maxRaw = maxEl && maxEl.value ? String(maxEl.value).trim() : '';
    var maxPayload = null;
    if (maxRaw !== '') {
      var mi = parseInt(maxRaw, 10);
      if (isFinite(mi) && mi >= 1) maxPayload = mi;
    }
    var stQ = replayStatusNow();
    if (stQ) stQ.textContent = 'A enfileirar motor do replay no servidor…';
    fetch(STREAM_API, {
      method: 'POST',
      credentials: 'same-origin',
      headers: {
        'Content-Type': 'application/json',
        'X-CSRFToken': tok,
      },
      body: JSON.stringify({
        pace_sec: paceSec,
        max_snapshots: maxPayload,
        ticker: getReplayTicker(),
      }),
    })
      .then(function(r) {
        return r.json().then(function(j) {
          return { status: r.status, j: j };
        });
      })
      .then(function(out) {
        var st = replayStatusNow();
        if (!out.j || !out.j.ok) {
          var err = out.j && out.j.error ? String(out.j.error) : 'HTTP ' + out.status;
          if (st) st.textContent = 'Motor: ' + err;
          return;
        }
        var tid = out.j.task_id ? String(out.j.task_id) : '';
        if (st) {
          st.textContent =
            'Motor enfileirado (Celery)' + (tid ? ' · ' + tid : '') + '. O relógio virtual não foi alterado.';
        }
      })
      .catch(function() {
        var stX = replayStatusNow();
        if (stX) stX.textContent = 'Erro de rede ao enfileirar motor.';
      });
  }

  if (btnPlay) btnPlay.addEventListener('click', function() { resumePlayVirtual(false); });
  if (btnContinue) btnContinue.addEventListener('click', function() { resumePlayVirtual(false); });
  if (btnPause) btnPause.addEventListener('click', function() { pauseVirtual(false); });
  if (btnReset) btnReset.addEventListener('click', function() { resetVirtual(); });
  if (btnMotor) btnMotor.addEventListener('click', function() { enqueueReplayMotor(); });

  var candlesTickerEl = document.getElementById('candles-ticker');
  if (candlesTickerEl) {
    candlesTickerEl.addEventListener('change', function() {
      resetVirtual();
    });
  }

  setTimeout(function() {
    primeReplayChart();
  }, 360);
})();
</script>
